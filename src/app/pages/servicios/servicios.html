<div class="home-wrapper">
  
  <section class="services-section">
    <div class="services-header">
      <h2>Recorridos y Horarios</h2>
      <p>Seleccioná una línea para ver su recorrido en el mapa.</p>
    </div>

    <div class="tabs-container">
      <button class="tab-btn" [class.active]="lineaActiva === 'lineaA'" (click)="cambiarLinea('lineaA')">Línea A</button>
      <button class="tab-btn" [class.active]="lineaActiva === 'lineaB'" (click)="cambiarLinea('lineaB')">Línea B</button>
      <button class="tab-btn" [class.active]="lineaActiva === 'lineaC'" (click)="cambiarLinea('lineaC')">Línea C</button>
      <button class="tab-btn" [class.active]="lineaActiva === 'yuspe'" (click)="cambiarLinea('yuspe')">Yuspe</button>
    </div>

    <div class="map-wrapper">
      
      @if (!mapaInteractivo) {
        <div class="map-overlay" (click)="activarMapa()">
          <button class="btn-activate-map">
            <span class="material-icons">touch_app</span>
            Tocar para interactuar
          </button>
        </div>
      }

      @switch (lineaActiva) {
        @case ('lineaA') {
          <iframe [class.is-interactive]="mapaInteractivo" src="https://www.google.com/maps/d/embed?mid=1ziia3grxSpNBN_AfxwDuc-n9uHuB2MxB&ehbc=2E312F" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        }
        @case ('lineaB') {
          <iframe [class.is-interactive]="mapaInteractivo" src="https://www.google.com/maps/d/embed?mid=1ziia3grxSpNBN_AfxwDuc-n9uHuB2MxB&ehbc=2E312F" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        }
        @case ('lineaC') {
          <iframe [class.is-interactive]="mapaInteractivo" src="https://www.google.com/maps/d/embed?mid=1ziia3grxSpNBN_AfxwDuc-n9uHuB2MxB&ehbc=2E312F" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        }
        @case ('yuspe') {
          <iframe [class.is-interactive]="mapaInteractivo" src="https://www.google.com/maps/d/embed?mid=1ziia3grxSpNBN_AfxwDuc-n9uHuB2MxB&ehbc=2E312F" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        }
      }
    </div>
  </section>

</div>
