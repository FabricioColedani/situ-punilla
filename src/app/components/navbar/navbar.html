<header class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
      <span class="material-icons brand-icon">directions_bus</span>
      <span class="brand-text">App SiTu</span>
    </a>

    <button 
      class="hamburger-btn" 
      (click)="toggleMenu()" 
      [ngClass]="{ 'is-active': isMenuOpen }"
      aria-label="Abrir menú de navegación"
      aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <nav class="nav-menu" [ngClass]="{ 'is-open': isMenuOpen }">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="closeMenu()">Inicio</a>
        </li>
        <li class="nav-item">
          <a routerLink="/sobre-nosotros" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Institución</a>
        </li>
        <li class="nav-item">
          <a routerLink="/servicios" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Servicios/Horarios</a>
        </li>
        <li class="nav-item">
          <a routerLink="/blog" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Blog</a>
        </li>
        <li class="nav-item">
          <a routerLink="/contacto" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Contacto</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<div class="menu-overlay" [ngClass]="{ 'is-visible': isMenuOpen }" (click)="closeMenu()"></div>
